# Inventario CP2 - guiurm
# Clave SSH obtenida con: terraform output -raw ssh_private_key > private_key.pem

[web]
vm-cp2-guiurm ansible_host=40.89.184.181 ansible_user=guiurm ansible_ssh_private_key_file=private_key.pem ansible_python_interpreter=/usr/bin/python3

[registry]
localhost ansible_connection=local

[kubernetes]
localhost ansible_connection=local

[all:vars]
# Azure
resource_group_name=rg-cp2-guiurm
aks_name=aks-cp2-guiurm

# ACR
acr_login_server=acrunircp2guiurm.azurecr.io
acr_username=acrunircp2guiurm

# Imágenes
container_image_tag=casopractico2
web_image_name=webserver
app_frontend_image_name=frontend
app_backend_image_name=backend

# Namespace AKS
app_namespace=cp2
